<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantalla de Carga GMod</title>
    <style>
        /* Estilos Generales */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body {
            background: #0f0c20;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 50px 20px;
        }

        /* Fondo Animado de Gradiente */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(-45deg, #1e1b4b, #311042, #111827, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: -1;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Contenedor Superior (Información) */
        .header {
            text-align: center;
            margin-top: 20px;
        }
        .server-title {
            font-size: 3rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #38bdf8;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
            margin-bottom: 10px;
        }
        .welcome-text {
            font-size: 1.3rem;
            color: #94a3b8;
        }
        #player-name {
            color: #f43f5e;
            font-weight: bold;
        }

        /* Contenedor Central (Reglas / Datos) */
        .content {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .content h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #f59e0b;
        }
        .rules-list {
            list-style: none;
            text-align: left;
            display: inline-block;
        }
        .rules-list li {
            margin: 10px 0;
            font-size: 1.1rem;
            color: #cbd5e1;
        }
        .rules-list li::before {
            content: "• ";
            color: #38bdf8;
            font-weight: bold;
        }

        /* Contenedor Inferior (Barra de Carga y Mapa) */
        .footer {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        .map-info {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 10px;
        }
        #map-name {
            color: #10b981;
            font-weight: 600;
        }
        .progress-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            height: 20px;
            width: 100%;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
            margin-bottom: 8px;
        }
        .progress-bar {
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            height: 100%;
            width: 0%;
            border-radius: 50px;
            transition: width 0.4s ease;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.7);
        }
        #status-text {
            font-size: 0.9rem;
            color: #64748b;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <!-- Encabezado -->
    <div class="header">
        <h1 class="server-title">Mi Servidor GMod</h1>
        <p class="welcome-text">Bienvenido, <span id="player-name">Invitado</span></p>
    </div>

    <!-- Reglas del Servidor -->
    <div class="content">
        <h3>Reglas del Servidor</h3>
        <ul class="rules-list">
            <li>Respetar a todos los jugadores.</li>
            <li>No usar hacks, scripts o exploits.</li>
            <li>No hacer spam en el chat de voz o texto.</li>
            <li>Sigue las instrucciones del Staff.</li>
        </ul>
    </div>

    <!-- Barra de estado y Mapa -->
    <div class="footer">
        <p class="map-info">Cargando mapa: <span id="map-name">Buscando...</span></p>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <p id="status-text">Conectando con el servidor...</p>
    </div>

    <!-- Integración con la API de Garry's Mod -->
    <script>
        // Estas funciones las ejecuta GMod automáticamente al conectar
        function GameDetails( servername, serverurl, mapname, maxplayers, steamid, gamemode, volume, language ) {
            document.getElementById('map-name').innerText = mapname;
        }

        function DownloadingFile( fileName ) {
            document.getElementById('status-text').innerText = "Descargando: " + fileName;
        }

        function SetStatusChanged( status ) {
            document.getElementById('status-text').innerText = status;
            
            // Simulación visual del progreso según el estado interno del juego
            const bar = document.getElementById('progress-bar');
            if (status.includes("Connecting")) bar.style.width = "20%";
            if (status.includes("Downloading")) bar.style.width = "50%";
            if (status.includes("Workshop")) bar.style.width = "75%";
            if (status.includes("Sending")) bar.style.width = "95%";
        }

        // Intenta obtener los datos del jugador desde la URL que GMod genera dinámicamente
        function getQueryVariable(variable) {
            const query = window.location.search.substring(1);
            const vars = query.split("&");
            for (let i=0; i<vars.length; i++) {
                const pair = vars[i].split("=");
                if(pair[0] == variable){return decodeURIComponent(pair[1]);}
            }
            return(false);
        }

        // Si la URL provee el SteamID64, podemos intentar usar una API. 
        // Por defecto, mostramos un saludo genérico si no se ejecuta dentro de GMod.
        window.addEventListener("DOMContentLoaded", () => {
            // Nota: GMod ya no pasa el nombre directo por URL debido a políticas de privacidad, 
            // pero deja disponible el campo listo si usas herramientas externas.
            const map = getQueryVariable("mapname");
            if (map) {
                document.getElementById('map-name').innerText = map;
            }
        });
    </script>
</body>
</html>
